<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Cuentas</title>

    <style>
        body {
            background-color: #f2f2f2;
        }

        .encabezado {
            background-color: lightgreen;
            padding: 15px;
            text-align: left;
        }

        h1 {
            font-family: Arial;
            color: darkgreen;
        }

        .caja {
            border: 2px solid black;
            margin: 20px;
            padding: 10px;
            background-color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>

<body>

    <div class="encabezado">
        <h1>Pantalla de Clientes</h1>
    </div>

    <div class="caja">
        <p>Bienvenido a la sección de clientes.</p>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Ciudad</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Ana Pérez</td>
                    <td>León</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Carlos Gómez</td>
                    <td>Guadalajara</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>María López</td>
                    <td>Monterrey</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
